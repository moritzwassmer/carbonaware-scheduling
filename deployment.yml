apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopfexample-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      application: kopfexample-operator
  template:
    metadata:
      labels:
        application: kopfexample-operator
    spec:
      serviceAccountName: kopfexample-account
      containers:
      - name: the-only-one
        image: mowassmer/task4:1.0.2
        imagePullPolicy: Always #IfNotPresent
        env: 
        ENV NUM_WORKLOADS=2
        ENV WORKLOAD_SCHEDULING_PERIOD=10
        ENV SCHEDULING_STRATEGY=carbonaware