apiVersion: batch/v1
kind: Job
metadata:
  name: scheduler-job
spec:
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      serviceAccountName: scheduler-service-account
      containers:
        - name: scheduler-container
          image: mowassmer/task4:1.0.1 # Replace with your actual image
          imagePullPolicy: Always #IfNotPresent
          env:
            - name: WORKLOAD_SCHEDULING_PERIOD
              value: "10" # Default scheduling period in seconds
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
      restartPolicy: Never
